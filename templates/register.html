<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | AI Resume Screening</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>

<body>
<video autoplay muted loop playsinline id="bgVideo">
    <source src="{{ url_for('static', filename='videos/ai-register.mp4') }}" type="video/mp4">
</video>
<div class="container mt-5">

<div class="card p-4 mx-auto" style="max-width:500px;">

<h3 class="text-center mb-4">
Create Account
</h3>

{% if error %}
<div class="alert alert-danger">
{{ error }}
</div>
{% endif %}

<form action="/register" method="POST">

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="full_name"
class="form-control"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
id="email"
name="email"
class="form-control"
required>

</div>

<button
type="button"
id="sendBtn"
class="btn btn-primary w-100"
onclick="sendOTP()">

<span id="sendText">
Send OTP
</span>

<span
id="loader"
class="spinner-border spinner-border-sm d-none">
</span>

</button>

<br><br>

<div class="mb-3">

<label>OTP</label>

<input
type="text"
id="otp"
class="form-control">

</div>

<button
type="button"
class="btn btn-warning w-100"
onclick="verifyOTP()">

Verify OTP

</button>

<br><br>

<div class="mb-3">

<label>Password</label>

<div class="input-group">

<input
type="password"
id="password"
name="password"
class="form-control"
disabled
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword('password',this)"
disabled
id="passBtn">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="mb-3">

<label>Confirm Password</label>

<div class="input-group">

<input
type="password"
id="confirm"
name="confirm"
class="form-control"
disabled
required>

<button
type="button"
class="btn btn-outline-secondary"
onclick="togglePassword('confirm',this)"
disabled
id="confirmBtn">

<i class="bi bi-eye"></i>

</button>

</div>

</div>

<button
type="submit"
id="registerBtn"
class="btn btn-success w-100"
disabled>

<span id="registerText">
Register
</span>

<span
id="registerSpinner"
class="spinner-border spinner-border-sm ms-2 d-none"
role="status">
</span>

</button>

</form>

<div class="text-center mt-3">

<a href="/login">
Already have an account?
</a>

</div>

</div>

</div>

<script>

function sendOTP() {

    let btn = document.getElementById("sendBtn");
    let loader = document.getElementById("loader");
    let text = document.getElementById("sendText");

    btn.disabled = true;
    loader.classList.remove("d-none");
    text.innerHTML = "Sending...";

    fetch("/send_register_otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: document.getElementById("email").value
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error("HTTP Error: " + response.status);
        }
        return response.json();
    })
    .then(data => {
        alert(data.message);
    })
    .catch(error => {
        console.error(error);
        alert("Error: " + error.message);
    })
    .finally(() => {
        btn.disabled = false;
        loader.classList.add("d-none");
        text.innerHTML = "Send OTP";
    });

}


function verifyOTP(){

fetch("/verify_register_otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

otp:document.getElementById("otp").value

})

})

.then(async (res) => {
    const text = await res.text();
    console.log(text);

    try {
        return JSON.parse(text);
    } catch (e) {
        throw new Error(text);
    }
})


.then(data=>{

alert(data.message);

if(data.success){

document.getElementById("password").disabled=false;

document.getElementById("confirm").disabled=false;

document.getElementById("registerBtn").disabled=false;

document.getElementById("passBtn").disabled=false;

document.getElementById("confirmBtn").disabled=false;

}

});

}

function togglePassword(id,btn){

let input=document.getElementById(id);

if(input.type=="password"){

input.type="text";

btn.innerHTML='<i class="bi bi-eye-slash"></i>';

}

else{

input.type="password";

btn.innerHTML='<i class="bi bi-eye"></i>';

}

}

document.querySelector("form").addEventListener("submit", function () {

    const btn = document.getElementById("registerBtn");
    const text = document.getElementById("registerText");
    const spinner = document.getElementById("registerSpinner");

    btn.disabled = true;

    text.innerHTML = "Registering...";

    spinner.classList.remove("d-none");

});
</script>

</body>
</html>

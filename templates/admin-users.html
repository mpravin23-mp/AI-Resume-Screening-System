<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Manage Users</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->

<div class="col-md-2 bg-dark text-white min-vh-100 p-4">

<h3>
<i class="bi bi-shield-lock-fill"></i>
Admin
</h3>

<hr>

<a href="{{ url_for('admin_dashboard') }}" class="d-block text-white mb-3 text-decoration-none">
<i class="bi bi-speedometer2"></i>
Dashboard
</a>

<a href="{{ url_for('admin_users') }}" class="d-block text-warning mb-3 text-decoration-none">
<i class="bi bi-people-fill"></i>
Users
</a>

<a href="{{ url_for('admin_records') }}" class="d-block text-white mb-3 text-decoration-none">
<i class="bi bi-file-earmark-text"></i>
Resume Records
</a>

<a href="{{ url_for('admin_rankings') }}" class="d-block text-white mb-3 text-decoration-none">
<i class="bi bi-trophy-fill"></i>
Rankings
</a>

<a href="{{ url_for('admin_logout') }}" class="d-block text-white text-decoration-none">
<i class="bi bi-box-arrow-right"></i>
Logout
</a>

</div>

<!-- Content -->

<div class="col-md-10 p-4">

<h2 class="mb-4">
<i class="bi bi-people-fill"></i>
Manage Users
</h2>

<table class="table table-bordered table-hover">

<thead class="table-dark">

<tr>

<th>ID</th>

<th>Name</th>

<th>Email</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody>

{% for user in users %}

<tr>

<td>{{ user[0] }}</td>

<td>{{ user[1] }}</td>

<td>{{ user[2] }}</td>

<td>

{% if user[3] == 'Active' %}

<span class="badge bg-success">
Active
</span>

{% else %}

<span class="badge bg-danger">
Inactive
</span>

{% endif %}

</td>

<td>

<a href="/activate-user/{{ user[0] }}"
class="btn btn-success btn-sm">

<i class="bi bi-check-circle"></i>

</a>

<a href="/deactivate-user/{{ user[0] }}"
class="btn btn-warning btn-sm">

<i class="bi bi-pause-circle"></i>

</a>

<a href="/delete-user/{{ user[0] }}"
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this user?')">

<i class="bi bi-trash"></i>

</a>

</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>

</html>

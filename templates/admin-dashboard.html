<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='css/admin.css') }}">

</head>

<body>

<div class="container-fluid">

<div class="row">

<!-- Sidebar -->
<!-- Sidebar -->
<div class="col-md-2 bg-dark text-white min-vh-100 p-4">

    <h3>
        <i class="bi bi-shield-lock-fill"></i>
        Admin
    </h3>

    <hr>

    <a href="{{ url_for('admin_dashboard') }}"
       class="d-block text-white text-decoration-none mb-3">
        <i class="bi bi-speedometer2"></i>
        Dashboard
    </a>

    <a href="{{ url_for('admin_users') }}"
       class="d-block text-white text-decoration-none mb-3">
        <i class="bi bi-people-fill"></i>
        Users
    </a>

    <a href="{{ url_for('admin_records') }}"
       class="d-block text-white text-decoration-none mb-3">
        <i class="bi bi-file-earmark-text"></i>
        Resume Records
    </a>

    <a href="{{ url_for('admin_rankings') }}"
       class="d-block text-white text-decoration-none mb-3">
        <i class="bi bi-trophy-fill"></i>
        Rankings
    </a>

    <a href="{{ url_for('admin_logout') }}"
       class="d-block text-white text-decoration-none">
        <i class="bi bi-box-arrow-right"></i>
        Logout
    </a>

</div>

<!-- Content -->

<div class="col-md-10 p-4">

<h2>Dashboard</h2>

<div class="row mt-4">

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Total Users</h5>
<h2>{{ total_users }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Active Users</h5>
<h2>{{ active_users }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Inactive Users</h5>
<h2>{{ inactive_users }}</h2>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card shadow">
<div class="card-body text-center">
<h5>Resume Records</h5>
<h2>{{ total_records }}</h2>
</div>
</div>
</div>

</div>

</div>

</div>

</div>

</body>

</html>

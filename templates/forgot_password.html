<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/forgot_password.css') }}">
</head>

<body>
    <video autoplay muted loop playsinline id="bgVideo">
    <source src="{{ url_for('static', filename='videos/ai-forget.mp4') }}" type="video/mp4">
</video>

<div class="container mt-5">

    <div class="card p-4 mx-auto" style="max-width:500px;">

        <h3 class="text-center mb-4">
            Forgot Password
        </h3>

        <!-- Email -->
        <div class="mb-3">

            <label>Email</label>

            <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Enter Registered Email">

        </div>

        <!-- Send OTP -->
        <button
    id="sendBtn"
    class="btn btn-primary w-100 mb-3"
    onclick="sendOTP()">

    <span id="sendText">Send OTP</span>

    <span
        id="sendLoader"
        class="spinner-border spinner-border-sm d-none">
    </span>

</button>

        <!-- OTP -->
        <div class="mb-3">

            <label>OTP</label>

            <input
                type="text"
                id="otp"
                class="form-control"
                placeholder="Enter OTP">

        </div>

        <!-- Verify OTP -->
        <button
            class="btn btn-warning w-100 mb-3"
            onclick="verifyOTP()">

            Verify OTP

        </button>

        <!-- Password -->
        <div class="mb-3">

            <label>New Password</label>

            <input
                type="password"
                id="password"
                class="form-control"
                placeholder="New Password"
                disabled>

        </div>

        <!-- Confirm Password -->
        <div class="mb-3">

            <label>Confirm Password</label>

            <input
                type="password"
                id="confirm"
                class="form-control"
                placeholder="Confirm Password"
                disabled>

        </div>

        <!-- Update Button -->
        <button
            id="updateBtn"
            class="btn btn-success w-100"
            onclick="updatePassword()"
            disabled>

            Update Password

        </button>

        <div class="text-center mt-4">

            <a href="/login">
                Back to Login
            </a>

        </div>

    </div>

</div>

<script>

function sendOTP(){

    let btn = document.getElementById("sendBtn");
    let text = document.getElementById("sendText");
    let loader = document.getElementById("sendLoader");

    btn.disabled = true;
    text.innerHTML = "Sending OTP...";
    loader.classList.remove("d-none");

    fetch("/send_forgot_otp",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            email:document.getElementById("email").value
        })

    })

    .then(res=>res.json())

    .then(data=>{

        alert(data.message);

        btn.disabled = false;
        text.innerHTML = "Send OTP";
        loader.classList.add("d-none");

    })

    .catch(()=>{

        alert("Failed to send OTP.");

        btn.disabled = false;
        text.innerHTML = "Send OTP";
        loader.classList.add("d-none");

    });

}

function verifyOTP(){

fetch("/verify_forgot_otp",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

otp:document.getElementById("otp").value

})

})

.then(res=>res.json())

.then(data=>{

alert(data.message);

if(data.success){

document.getElementById("password").disabled=false;

document.getElementById("confirm").disabled=false;

document.getElementById("updateBtn").disabled=false;

}

});

}


function updatePassword(){

fetch("/update_password",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

otp:document.getElementById("otp").value,

password:document.getElementById("password").value,

confirm:document.getElementById("confirm").value

})

})

.then(res=>res.json())

.then(data=>{

alert(data.message);

if(data.success){

window.location="/login";

}

});

}

</script>

</body>
</html>

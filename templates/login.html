<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | AI Resume Screening</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* =========================
           PAGE WRAPPER
        ========================= */
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;

            background-color: #060d18;
            color: white;
            position: relative;
            overflow: hidden;
        }

        /* =========================
           BACKGROUND IMAGE LAYER — image on right, subtle blink
        ========================= */
        .bg-layer {
            position: absolute;
            inset: 0;
            z-index: 0;

            background-image: url("{{ url_for('static', filename='images/ai-reg2.png') }}");
            background-size: cover;
            background-position: right center;
            background-repeat: no-repeat;

            animation: bgBlink 4s ease-in-out infinite;
        }

        @keyframes bgBlink {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        /* Dark gradient wash on the left so the form panel stays readable */
        .bg-overlay {
            position: absolute;
            inset: 0;
            z-index: 1;
            background: linear-gradient(
                90deg,
                rgba(6, 13, 24, 0.95) 0%,
                rgba(6, 13, 24, 0.75) 45%,
                rgba(6, 13, 24, 0.2) 75%,
                rgba(6, 13, 24, 0.05) 100%
            );
        }

        /* =========================
           MAIN CONTAINER
        ========================= */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            padding: 40px;
        }

        /* =========================
           GLASS LOGIN PANEL — pinned left
        ========================= */
        .login-box {
            max-width: 420px;
            margin-left: 40px;

            background: rgba(6, 12, 24, 0.65);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);

            border-radius: 20px;
            padding: 40px;

            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 211, 238, 0.2);

            opacity: 0;
            animation: panelFadeIn 0.8s ease-out forwards;
        }

        @keyframes panelFadeIn {
            from {
                opacity: 0;
                transform: translateX(-25px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        h2 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            text-align: center;
            color: #7dd3fc;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        label {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 500;
            margin-bottom: 6px;
            display: block;
        }

        .form-control {
            height: 48px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            color: white;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .form-control:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #22d3ee;
            box-shadow: 0 0 0 0.25rem rgba(34, 211, 238, 0.25);
            color: white;
        }

        .form-control:-webkit-autofill {
            -webkit-box-shadow: 0 0 0px 1000px rgba(30, 41, 59, 0.9) inset;
            -webkit-text-fill-color: white;
        }

        .btn-login {
            width: 100%;
            height: 48px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            color: #06121f;
            background: linear-gradient(135deg, #22d3ee, #38bdf8);
            box-shadow: 0 8px 20px rgba(34, 211, 238, 0.25);
            transition: 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(34, 211, 238, 0.4);
            color: #06121f;
        }

        .bottom {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
        }

        .bottom a {
            color: #22d3ee;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom a:hover {
            text-decoration: underline;
        }

        .bottom .back-link {
            color: rgba(255, 255, 255, 0.6);
            font-weight: 500;
        }

        @media (max-width: 992px) {
            .bg-overlay {
                background: rgba(6, 13, 24, 0.85);
            }
            .login-box {
                margin-left: auto;
                margin-right: auto;
            }
        }

        @media (max-width: 500px) {
            .login-box {
                max-width: 100%;
                padding: 30px 25px;
            }
        }

    </style>

</head>

<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="login-container">

    <div class="login-box">

        <h2><i class="bi bi-box-arrow-in-right" style="color:#22d3ee;"></i> Welcome Back</h2>

        <p class="subtitle">
            AI Resume Screening System
        </p>

        <form action="/login" method="POST">

            <div class="mb-3">

                <label>Email Address</label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="mb-3">

    <label>Password</label>

    <input
        type="password"
        name="password"
        class="form-control"
        placeholder="Enter your password"
        required>

</div>

<div class="d-flex justify-content-between align-items-center mb-4">

    <div class="form-check">

        <input
            class="form-check-input"
            type="checkbox"
            name="remember"
            id="remember">

        <label class="form-check-label" for="remember">
            Remember Me
        </label>

    </div>

    <a href="{{ url_for('forgot_password') }}" class="forgot-link">
        Forgot Password?
    </a>

</div>

<button
    type="submit"
    class="btn btn-login">

    Login

</button>

        </form>

        <div class="bottom">

            Don't have an account?
            <a href="/register">Register</a>

            <br><br>

            <a href="/" class="back-link">
                ← Back to Home
            </a>

        </div>

    </div>

</div>

</body>

</html>
